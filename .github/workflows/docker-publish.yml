name: Build & Publish Docker image

# Baut das App-Image und veröffentlicht es in der GitHub Container Registry (GHCR).
# - Push auf main        → Tag :latest (und :main)
# - Git-Tag v*           → Versions-Tags (z. B. :1.2.3, :1.2, :1)
# - Manuell (Run workflow) auf jeder Branch → Tag mit dem Branch-Namen

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (Tags & Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image-Name wird von der Action automatisch klein geschrieben → ghcr.io/<owner>/leadpilot
          images: ghcr.io/${{ github.repository_owner }}/leadpilot
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
