name: Build & Publish Docker image

# Baut das App-Image, testet dass der Container startet, und veröffentlicht es
# in der GitHub Container Registry (GHCR).
# - Pull Request auf main → nur Build + Smoke-Test (kein Push)
# - Push auf main         → Tag :latest (und :main)
# - Git-Tag v*            → Versions-Tags (z. B. :1.2.3, :1.2, :1)
# - Manuell (Run workflow) auf jeder Branch → Tag mit dem Branch-Namen

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata (Tags & Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image-Name wird von der Action automatisch klein geschrieben → ghcr.io/<owner>/leadpilot
          images: ghcr.io/${{ github.repository_owner }}/leadpilot
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      # Image lokal bauen (load), damit wir es vor dem Push testen können.
      # Der gha-Cache wird vom späteren Push-Schritt wiederverwendet.
      - name: Build image (für Smoke-Test laden)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: leadpilot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Stellt sicher, dass der Container wirklich startet (fängt z. B. fehlende
      # COPY-Dateien ab) und /api/config 200 liefert – inkl. echter Datenbank.
      - name: Smoke-Test (Container startet + /api/config liefert 200)
        run: |
          set -e
          docker network create leadnet
          docker run -d --name pg --network leadnet \
            -e POSTGRES_USER=leadpilot -e POSTGRES_PASSWORD=leadpilot -e POSTGRES_DB=leadpilot \
            postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec pg pg_isready -U leadpilot -d leadpilot >/dev/null 2>&1 && break
            sleep 2
          done
          docker run -d --name app --network leadnet -p 3000:3000 \
            -e PGHOST=pg -e PGPORT=5432 -e PGUSER=leadpilot -e PGPASSWORD=leadpilot -e PGDATABASE=leadpilot \
            leadpilot:ci
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/config >/dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          echo "----- leadpilot logs -----"; docker logs app || true
          docker rm -f app pg >/dev/null 2>&1 || true
          docker network rm leadnet >/dev/null 2>&1 || true
          [ "$ok" = "1" ] || { echo "Smoke-Test fehlgeschlagen: /api/config nicht erreichbar"; exit 1; }
          echo "Smoke-Test OK"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
