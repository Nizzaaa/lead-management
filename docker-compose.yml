services:
  db:
    image: postgres:16-alpine
    container_name: leadpilot-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=leadpilot
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?bitte ein sicheres DB-Passwort in .env setzen}
      - POSTGRES_DB=leadpilot
    volumes:
      # Datenbank bleibt über Neustarts/Rebuilds hinweg erhalten
      - leadpilot-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadpilot -d leadpilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Härtung: keine Rechte-Eskalation, Ressourcen deckeln, Logs rotieren.
    # (Kein cap_drop/read_only: der Postgres-Entrypoint braucht Caps für die Init.)
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  leadpilot:
    build: .
    image: leadpilot:latest
    container_name: leadpilot
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # KI-Funktionen aktivieren: ANTHROPIC_API_KEY in einer .env-Datei setzen
      # (siehe .env.example). Ohne Key läuft die App ohne KI-Funktionen.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PORT=3000
      # Verbindung über einzelne PG*-Variablen (statt DATABASE_URL),
      # damit Sonderzeichen im Passwort keine Probleme machen.
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=leadpilot
      - PGPASSWORD=${POSTGRES_PASSWORD:?bitte ein sicheres DB-Passwort in .env setzen}
      - PGDATABASE=leadpilot
      # Cloudflare-Access-JWT-Verifikation (optional). Beide Werte setzen, damit
      # die App das Cf-Access-Token kryptografisch prüft, statt dem Header zu
      # vertrauen. Leer = aus (z. B. lokal ohne Cloudflare).
      - CF_ACCESS_TEAM_DOMAIN=${CF_ACCESS_TEAM_DOMAIN:-}
      - CF_ACCESS_AUD=${CF_ACCESS_AUD:-}
      # Abmelde-Ziel des Auth-Proxys (Logout-Button in der Topbar). Default passt
      # zu Cloudflare Access; für oauth2-proxy z. B. LOGOUT_URL=/oauth2/sign_out.
      # Leer setzen, um den Logout-Button auszublenden.
      - LOGOUT_URL=${LOGOUT_URL:-/cdn-cgi/access/logout}
      # Kalender-Sync (CalDAV, z. B. Nextcloud): Wiedervorlagen als Termine in
      # einen Kalender schreiben. Leer = aus. Siehe docs/nextcloud-caldav.md.
      - CALDAV_URL=${CALDAV_URL:-}
      - CALDAV_USERNAME=${CALDAV_USERNAME:-}
      - CALDAV_PASSWORD=${CALDAV_PASSWORD:-}
      - CALDAV_EVENT_TIME=${CALDAV_EVENT_TIME:-}
      - CALDAV_EVENT_DURATION_MIN=${CALDAV_EVENT_DURATION_MIN:-}
      - CALDAV_REMINDER_MIN=${CALDAV_REMINDER_MIN:-}
      - APP_BASE_URL=${APP_BASE_URL:-}
    # Härtung: non-root (im Image), keine Rechte-Eskalation, alle Caps weg,
    # read-only Root-FS (App schreibt nichts) mit beschreibbarem /tmp.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy

volumes:
  leadpilot-db:
