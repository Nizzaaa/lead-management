# LeadPilot – Dockge-/GHCR-Variante mit Traefik
#
# Diese Compose-Datei nutzt das vorgebaute Image aus der GitHub Container Registry
# (GHCR) und stellt die App über Traefik bereit.
#
# Voraussetzungen:
#   - Traefik läuft bereits und nutzt ein Docker-Netzwerk (hier: "traefik").
#     Passe den Netzwerknamen unten an deinen Traefik an (oft auch "proxy" o. ä.).
#   - Ein Traefik-Entrypoint "web" ist konfiguriert.
#
# So einrichten (Dockge):
#   1. "+ Compose" → Stack-Name z. B. "leadpilot".
#   2. Diesen Inhalt einfügen.
#   3. Im ".env"-Editor die Variablen setzen:
#        ANTHROPIC_API_KEY=sk-ant-...                 # optional, aktiviert die KI-Funktionen
#        POSTGRES_PASSWORD=einsicheres                # Passwort der Datenbank
#        FRAME_ANCESTORS=https://cloud.lennartg.de    # Nextcloud-URL für die iframe-Einbettung
#   4. Deploy/Start klicken.
#
# Hinweis: Ist das GHCR-Paket privat, muss der Docker-Host vorher per
#   `docker login ghcr.io` angemeldet sein – oder das Paket auf "public" stellen.

services:
  db:
    image: postgres:16-alpine
    container_name: leadpilot-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=leadpilot
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?bitte ein sicheres DB-Passwort in .env setzen}
      - POSTGRES_DB=leadpilot
    volumes:
      - leadpilot-db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadpilot -d leadpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  leadpilot:
    # Produktiv eine feste Version pinnen, statt blind :latest zu ziehen:
    #   im .env-Editor z. B.  LEADPILOT_TAG=1.4.0
    # So aktualisierst du Prod bewusst (Release = Git-Tag v1.4.0 → CI baut :1.4.0).
    # Ohne gesetzten Wert wird :latest verwendet.
    image: ghcr.io/nizzaaa/leadpilot:${LEADPILOT_TAG:-latest}
    container_name: leadpilot
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PORT=3000
      # Verbindung über einzelne PG*-Variablen (statt DATABASE_URL),
      # damit Sonderzeichen im Passwort keine Probleme machen.
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=leadpilot
      - PGPASSWORD=${POSTGRES_PASSWORD:?bitte ein sicheres DB-Passwort in .env setzen}
      - PGDATABASE=leadpilot
      # Einbettung in Nextcloud (iframe) erlauben – im .env-Editor auf die
      # Nextcloud-Origin setzen, z. B. FRAME_ANCESTORS=https://cloud.lennartg.de
      # Leer = kein frame-ancestors-Header (Einbettung dann nicht abgesichert).
      - FRAME_ANCESTORS=${FRAME_ANCESTORS:-}
    networks:
      - internal   # Verbindung zur Datenbank
      - traefik     # Ingress über Traefik
    depends_on:
      db:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.leadpilot.rule=Host(`leads.lennartg.de`)
      - traefik.http.routers.leadpilot.entrypoints=web
      - traefik.http.services.leadpilot.loadbalancer.server.port=3000
      # Bei mehreren Netzwerken muss Traefik wissen, welches es nutzen soll:
      - traefik.docker.network=traefik

networks:
  # Externes Traefik-Netzwerk (von der Traefik-Instanz bereitgestellt).
  # Den Namen ggf. an dein Setup anpassen (z. B. "proxy").
  traefik:
    external: true
  # Internes Netz nur für App <-> Datenbank (nicht von außen erreichbar).
  internal:

volumes:
  leadpilot-db:
