# LeadPilot – STAGING-Stack (Dockge/GHCR mit Traefik)
#
# Zweck: Eine eigene Test-Umgebung, die automatisch immer den neuesten Stand
# von main (Image-Tag :latest) fährt. Hier testest du, BEVOR du Prod auf eine
# feste Version (siehe compose.yaml) hebst.
#
# Unterschiede zu Prod (compose.yaml):
#   - eigener Host (staging.leads.lennartg.de)
#   - eigene Container-/Volume-Namen (kein Konflikt mit Prod)
#   - Image fest auf :latest (rollt mit jedem main-Merge mit)
#
# Empfohlener Ablauf:
#   main mergen → CI baut :latest → Staging neu deployen/pullen → testen
#   → zufrieden? Git-Tag vX.Y.Z setzen → CI baut :X.Y.Z → Prod auf diese Version.

services:
  db:
    image: postgres:16-alpine
    container_name: leadpilot-staging-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=leadpilot
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-leadpilot}
      - POSTGRES_DB=leadpilot
    volumes:
      - leadpilot-staging-db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadpilot -d leadpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  leadpilot:
    image: ghcr.io/nizzaaa/leadpilot:latest
    container_name: leadpilot-staging
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PORT=3000
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=leadpilot
      - PGPASSWORD=${POSTGRES_PASSWORD:-leadpilot}
      - PGDATABASE=leadpilot
    networks:
      - internal
      - traefik
    depends_on:
      db:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.leadpilot-staging.rule=Host(`staging.leads.lennartg.de`)
      - traefik.http.routers.leadpilot-staging.entrypoints=web
      - traefik.http.services.leadpilot-staging.loadbalancer.server.port=3000
      - traefik.docker.network=traefik

networks:
  traefik:
    external: true
  internal:

volumes:
  leadpilot-staging-db:
